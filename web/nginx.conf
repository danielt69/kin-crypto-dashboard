server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: unknown paths render the app shell.
  location / {
    try_files $uri /index.html;
  }

  # Same-origin API proxy. Buffering must be off or nginx would hold back
  # SSE frames until its buffer fills — the stream would look frozen.
  location /api/ {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection "";
    proxy_read_timeout 1h;
  }

  location /health {
    proxy_pass http://api:3001;
  }
}
